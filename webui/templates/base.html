<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ctfauto{% endblock %}</title>
  <style>
    :root {
      --bg:#0d1117; --panel:#161b22; --border:#30363d; --fg:#c9d1d9;
      --muted:#8b949e; --accent:#58a6ff; --green:#3fb950; --yellow:#d29922;
      --red:#f85149; --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--fg);
           font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
    a { color:var(--accent); text-decoration:none; }
    a:hover { text-decoration:underline; }
    header { border-bottom:1px solid var(--border); padding:14px 24px;
             display:flex; align-items:center; gap:14px; }
    header .logo { font-weight:700; letter-spacing:.5px; }
    header .logo b { color:var(--green); }
    header .loot { color:var(--muted); font-family:var(--mono); font-size:12px; margin-left:auto; }
    main { max-width:1080px; margin:0 auto; padding:24px; }
    h1,h2,h3 { line-height:1.25; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:10px;
            padding:16px; }
    .card h3 { margin:0 0 4px; font-family:var(--mono); }
    .meta { color:var(--muted); font-size:12px; display:flex; flex-wrap:wrap; gap:10px; margin:6px 0 10px; }
    .pill { display:inline-block; padding:1px 8px; border-radius:20px; border:1px solid var(--border);
            font-size:11px; font-family:var(--mono); }
    .pill.htb { color:var(--green); border-color:var(--green); }
    .pill.lab { color:var(--accent); border-color:var(--accent); }
    .pill.external { color:var(--yellow); border-color:var(--yellow); }
    .stats { display:flex; gap:18px; margin:8px 0; }
    .stats div { text-align:center; }
    .stats .n { font-size:20px; font-weight:700; }
    .stats .l { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
    ol.leads { margin:8px 0 0; padding-left:20px; }
    ol.leads li { margin:3px 0; }
    .muted { color:var(--muted); }
    .report { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:8px 24px; }
    .report table { border-collapse:collapse; width:100%; margin:12px 0; }
    .report th, .report td { border:1px solid var(--border); padding:6px 10px; text-align:left; }
    .report th { background:#1f2630; }
    .report pre { background:#0b0f14; border:1px solid var(--border); border-radius:8px;
                  padding:12px; overflow:auto; font-family:var(--mono); font-size:12.5px; }
    .report code { font-family:var(--mono); background:#0b0f14; padding:1px 5px; border-radius:4px; }
    .report pre code { background:none; padding:0; }
    .report blockquote { border-left:3px solid var(--border); margin:10px 0; padding:2px 14px; color:var(--muted); }
    .leadbox { background:var(--panel); border:1px solid var(--border); border-left:3px solid var(--green);
               border-radius:10px; padding:14px 20px; margin-bottom:18px; }
    .timeline { font-family:var(--mono); font-size:12.5px; }
    .timeline .ev { padding:3px 0; border-bottom:1px solid #1c2230; }
    .timeline .ts { color:var(--muted); }
    .timeline .kind { color:var(--accent); }
    .back { font-family:var(--mono); font-size:12px; }
    .empty { color:var(--muted); padding:40px 0; text-align:center; }
    .live-dot { color:var(--green); animation:pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
  </style>
</head>
<body>
  <header>
    <span class="logo"><a href="/"><b>ctf</b>auto</a></span>
    <span class="muted">recon dashboard</span>
    <span class="loot">{{ loot if loot else '' }}</span>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
