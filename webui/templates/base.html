<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}vantage{% endblock %}</title>
  <style>
    :root {
      --bg:#03070b; --bg2:#050c14; --panel:rgba(8,18,28,.72); --panel-solid:#07121c;
      --border:#0d3d49; --border-lit:#1bd7ee;
      --fg:#cdeef6; --muted:#5d7d8a;
      --accent:#00e5ff; --accent-dim:#0a7c91; --green:#28ff9a; --yellow:#ffb000;
      --red:#ff3b54; --grid:rgba(0,229,255,.045);
      --mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,"Roboto Mono",monospace;
      --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      --glow:0 0 6px rgba(0,229,255,.45);
    }
    * { box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      margin:0; color:var(--fg); font:13.5px/1.55 var(--mono);
      background:
        radial-gradient(1200px 700px at 50% -10%, rgba(0,229,255,.06), transparent 60%),
        linear-gradient(0deg, var(--grid) 1px, transparent 1px) 0 0/100% 34px,
        linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0/34px 100%,
        var(--bg);
      min-height:100vh;
    }
    /* drifting scanline overlay — pure flair, never blocks clicks */
    body::after {
      content:""; position:fixed; inset:0; pointer-events:none; z-index:9999;
      background:linear-gradient(rgba(0,229,255,.05), rgba(0,229,255,0) 38%);
      height:140px; animation:scan 7s linear infinite; opacity:.6;
    }
    @keyframes scan { 0%{transform:translateY(-160px)} 100%{transform:translateY(100vh)} }

    a { color:var(--accent); text-decoration:none; }
    a:hover { text-shadow:var(--glow); }
    ::selection { background:rgba(0,229,255,.28); color:#eafdff; }
    ::-webkit-scrollbar { width:10px; height:10px; }
    ::-webkit-scrollbar-thumb { background:#0e2a33; border-radius:8px; }
    ::-webkit-scrollbar-thumb:hover { background:var(--accent-dim); }

    /* ---- header / hud bar ---------------------------------------------- */
    header {
      position:relative; padding:14px 24px; display:flex; align-items:center; gap:16px;
      background:linear-gradient(180deg, rgba(0,229,255,.05), transparent);
      border-bottom:1px solid var(--border);
    }
    header::after {  /* animated energized underline */
      content:""; position:absolute; left:0; right:0; bottom:-1px; height:1px;
      background:linear-gradient(90deg, transparent, var(--accent), transparent);
      background-size:50% 100%; animation:sweep 4s linear infinite; opacity:.8;
    }
    @keyframes sweep { 0%{background-position:-50% 0} 100%{background-position:150% 0} }
    header .logo { font-weight:700; letter-spacing:3px; text-transform:uppercase;
      font-size:16px; color:var(--accent); text-shadow:0 0 10px rgba(0,229,255,.55); }
    header .logo a { color:inherit; }
    header .logo .br { color:var(--accent-dim); }
    header .sub { color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; font-size:11px; }
    header .loot { color:var(--muted); font-size:11px; margin-left:auto;
      border:1px solid var(--border); border-radius:4px; padding:3px 9px; }
    header .loot::before { content:"◇ "; color:var(--accent-dim); }

    main { max-width:1120px; margin:0 auto; padding:26px 24px 60px; }
    h1,h2,h3 { line-height:1.2; letter-spacing:1px; }
    h1 { font-size:22px; text-transform:uppercase; text-shadow:0 0 12px rgba(0,229,255,.3); }
    h2 { font-size:14px; text-transform:uppercase; letter-spacing:2px; color:var(--accent);
      border-left:3px solid var(--accent); padding-left:10px; margin:26px 0 12px;
      text-shadow:var(--glow); }

    /* ---- cards with corner brackets ------------------------------------ */
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:18px; }
    .card, .report, .leadbox {
      position:relative; background:var(--panel); border:1px solid var(--border);
      border-radius:4px; backdrop-filter:blur(2px);
      box-shadow:inset 0 0 22px rgba(0,229,255,.04), 0 0 0 1px rgba(0,0,0,.3);
    }
    .card { padding:16px; transition:border-color .2s, box-shadow .2s, transform .2s; }
    .card::before, .card::after {
      content:""; position:absolute; width:12px; height:12px; pointer-events:none;
      border:1px solid var(--accent); opacity:.55; transition:opacity .2s;
    }
    .card::before { top:-1px; left:-1px; border-right:0; border-bottom:0; }
    .card::after  { bottom:-1px; right:-1px; border-left:0; border-top:0; }
    .card:hover { border-color:var(--accent-dim); transform:translateY(-2px);
      box-shadow:inset 0 0 22px rgba(0,229,255,.07), 0 0 18px rgba(0,229,255,.12); }
    .card:hover::before, .card:hover::after { opacity:1; }
    .card h3 { margin:0 0 4px; color:var(--fg); }

    .meta { color:var(--muted); font-size:11.5px; display:flex; flex-wrap:wrap; gap:10px; margin:6px 0 10px; }
    .pill { display:inline-block; padding:1px 9px; border-radius:3px; border:1px solid var(--border);
      font-size:10.5px; text-transform:uppercase; letter-spacing:1px; }
    .pill.htb { color:var(--green); border-color:var(--green); box-shadow:0 0 8px rgba(40,255,154,.25); }
    .pill.lab { color:var(--accent); border-color:var(--accent); box-shadow:0 0 8px rgba(0,229,255,.25); }
    .pill.external { color:var(--yellow); border-color:var(--yellow); box-shadow:0 0 8px rgba(255,176,0,.25); }

    .stats { display:flex; gap:20px; margin:10px 0; }
    .stats div { text-align:center; }
    .stats .n { font-size:22px; font-weight:700; color:var(--accent); text-shadow:var(--glow); }
    .stats .l { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }

    ol.leads { margin:8px 0 0; padding-left:20px; }
    ol.leads li { margin:4px 0; }
    ol.leads li::marker { color:var(--accent); }
    .muted { color:var(--muted); }

    /* ---- report body — readable prose, terminal frame ------------------ */
    .report { padding:10px 26px; font-family:var(--sans); }
    .report table { border-collapse:collapse; width:100%; margin:12px 0; font-family:var(--mono); font-size:12.5px; }
    .report th, .report td { border:1px solid var(--border); padding:6px 10px; text-align:left; }
    .report th { background:rgba(0,229,255,.08); color:var(--accent); text-transform:uppercase;
      letter-spacing:.5px; font-size:11px; }
    .report tr:hover td { background:rgba(0,229,255,.03); }
    .report pre { background:#020609; border:1px solid var(--border); border-left:3px solid var(--accent-dim);
      border-radius:4px; padding:12px; overflow:auto; font-family:var(--mono); font-size:12.5px;
      box-shadow:inset 0 0 18px rgba(0,229,255,.05); }
    .report code { font-family:var(--mono); background:#020609; padding:1px 5px; border-radius:3px; color:var(--accent); }
    .report pre code { background:none; padding:0; color:inherit; }
    .report blockquote { border-left:3px solid var(--accent-dim); margin:10px 0; padding:2px 14px; color:var(--muted); }
    .report h1, .report h2, .report h3 { font-family:var(--mono); }
    .report h2 { border:0; padding:0; color:var(--accent); }

    .leadbox { border-left:3px solid var(--accent); padding:14px 20px; margin-bottom:18px; }
    .leadbox strong { color:var(--accent); text-shadow:var(--glow); letter-spacing:1px; }

    /* ---- run timeline -------------------------------------------------- */
    .timeline { font-family:var(--mono); font-size:12.5px;
      border:1px solid var(--border); border-radius:4px; padding:8px 14px; background:var(--panel); }
    .timeline .ev { padding:3px 0; border-bottom:1px solid rgba(0,229,255,.06); }
    .timeline .ev:last-child { border-bottom:0; }
    .timeline .ts { color:var(--muted); }
    .timeline .kind { color:var(--accent); text-transform:uppercase; letter-spacing:.5px; }

    .back { font-size:12px; }
    .back a::before { content:"‹ "; }
    .empty { color:var(--muted); padding:48px 0; text-align:center; }

    /* ---- live indicators ----------------------------------------------- */
    .live-dot { color:var(--accent); animation:pulse 1.1s ease-in-out infinite; text-shadow:var(--glow); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* ---- progress bar (live nmap %) ------------------------------------ */
    .progress { margin-top:8px; }
    .progress .track { height:9px; max-width:340px; border:1px solid var(--border);
      border-radius:3px; overflow:hidden; background:#020609; box-shadow:inset 0 0 8px rgba(0,0,0,.6); }
    .progress .fill { height:100%; background:linear-gradient(90deg, var(--accent-dim), var(--accent));
      box-shadow:0 0 12px rgba(0,229,255,.6); position:relative; transition:width .6s ease; }
    .progress .fill::after { content:""; position:absolute; inset:0;
      background:repeating-linear-gradient(120deg, transparent 0 8px, rgba(255,255,255,.18) 8px 12px);
      animation:barflow 1s linear infinite; }
    @keyframes barflow { from{background-position:0 0} to{background-position:24px 0} }
    .progress .lbl { font-size:11.5px; color:var(--accent); letter-spacing:.5px; }

    /* ---- buttons ------------------------------------------------------- */
    .newscan, .btn {
      display:inline-block; background:transparent; color:var(--accent); cursor:pointer;
      border:1px solid var(--accent); border-radius:4px; padding:8px 18px; font-family:var(--mono);
      font-weight:700; letter-spacing:1.5px; text-transform:uppercase; font-size:12px;
      box-shadow:0 0 10px rgba(0,229,255,.18), inset 0 0 10px rgba(0,229,255,.06); transition:.15s;
    }
    .newscan:hover, .btn:hover { background:rgba(0,229,255,.12); color:#eafdff;
      box-shadow:0 0 18px rgba(0,229,255,.45), inset 0 0 14px rgba(0,229,255,.12); text-decoration:none; }
    .stopbtn { background:transparent; color:var(--red); border:1px solid var(--red);
      border-radius:4px; padding:4px 12px; font-size:11px; font-family:var(--mono);
      text-transform:uppercase; letter-spacing:1px; cursor:pointer; transition:.15s; }
    .stopbtn:hover { background:rgba(255,59,84,.16); box-shadow:0 0 14px rgba(255,59,84,.4); }
  </style>
</head>
<body>
  <header>
    <span class="logo"><a href="/"><span class="br">[</span>VANTAGE<span class="br">]</span></a></span>
    <span class="sub">// recon uplink</span>
    <span class="loot">{{ loot if loot else '' }}</span>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
